
name: terraform-ci

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: terraform-${{ matrix.dir }}
    runs-on:
      - self-hosted
      - linux
      - x64

    strategy:
      fail-fast: false
      matrix:
        dir: [ "network", "sqlserver", "ops" ]

    env:
      ARM_USE_MSI: true
      ARM_CLIENT_ID: ${{ secrets.TERRAFORM_UAMI_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_SKIP_AZURECLI_AUTH: "true"

    defaults:
      run:
        shell: bash
        working-directory: SQLPOC/${{ matrix.dir }}

    steps:

      - name: Install unzip and jq
        run: |
          sudo apt update
          sudo apt install -y unzip jq

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
         fetch-depth: 0

      - name: Set Az Login with UAMI
        run: |
          az login --identity

      - name: Force clean workspace
        run: |
          git reset --hard
          git clean -xfd
          git status

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.3"
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate