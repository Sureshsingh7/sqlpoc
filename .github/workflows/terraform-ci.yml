
name: terraform-ci

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: terraform-${{ matrix.dir }}
    runs-on:
      - self-hosted
      - linux
      - x64

    strategy:
      fail-fast: false
      matrix:
        dir: [ "network", "sqlserver", "ops", "wsfc" ]

    env:
      ARM_USE_MSI: true
      ARM_CLIENT_ID: ${{ secrets['TERRAFORM_UAMI_CLIENT_ID'] }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_SKIP_AZURECLI_AUTH: "true"

      # Provider downloads (esp. azapi) sometimes hit slow GitHub release endpoints.
      # Make init more resilient and cache plugins between steps/jobs.
      TF_REGISTRY_CLIENT_TIMEOUT: "300"
      TF_PLUGIN_CACHE_DIR: /tmp/terraform-plugin-cache

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.dir }}

    steps:

      - name: Install unzip and jq
        run: |
          sudo apt update
          sudo apt install -y unzip jq

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
         fetch-depth: 0

      - name: Force clean workspace
        run: |
          git reset --hard
          git clean -xfd
          git status

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.3"
          terraform_wrapper: false

      - name: Prepare Terraform plugin cache
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          echo "TF_PLUGIN_CACHE_DIR=${TF_PLUGIN_CACHE_DIR}"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: |
          set -euo pipefail

          # Retry helps with transient timeouts fetching provider checksums from GitHub.
          for attempt in 1 2 3; do
            echo "terraform init attempt ${attempt}/3"
            if terraform init -backend=false; then
              exit 0
            fi
            sleep 10
          done

          echo "terraform init failed after retries"
          exit 1

      - name: Terraform validate
        run: terraform validate