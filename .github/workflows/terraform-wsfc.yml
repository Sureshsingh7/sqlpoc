name: terraform-wsfc

on:
  workflow_dispatch:

concurrency:
  group: terraform-wsfc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-wsfc:
    timeout-minutes: 600
    runs-on:
      - self-hosted
      - linux
      - x64

    defaults:
      run:
        shell: bash
        working-directory: sqlserver

    env:
      ARM_USE_MSI: true
      ARM_CLIENT_ID: ${{ secrets['TERRAFORM_UAMI_CLIENT_ID'] }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_SKIP_AZURECLI_AUTH: "true"
      SQL_RG: rg-fnz-poc-sql-se
      SQL_VM_PRIMARY: sql-primary
      SQL_VM_SECONDARY: sql-secondary

      TF_REGISTRY_CLIENT_TIMEOUT: "300"
      TF_PLUGIN_CACHE_DIR: /tmp/terraform-plugin-cache

      CLUSTER_EXISTS: "unknown"
      RUNCOMMAND_READY: "unknown"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Az Login with UAMI
        run: |
          az login --identity --username "$ARM_CLIENT_ID"

      - name: Prepare Terraform plugin cache
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          echo "TF_PLUGIN_CACHE_DIR=${TF_PLUGIN_CACHE_DIR}"

      - name: Ensure SQL VMs are running
        run: |
          set -euo pipefail

          wait_running_strict() {
            local vm="$1"
            echo "Ensuring VM is running (strict): $vm"

            timeout 30s az vm start -g "$SQL_RG" -n "$vm" -o none 2>/dev/null || true

            for i in $(seq 1 60); do
              state="$(timeout 30s az vm get-instance-view -g "$SQL_RG" -n "$vm" \
                --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true)"
              ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "[$ts] [$i/60] $vm powerState=${state:-<unknown>}"
              if [ "$state" = "PowerState/running" ]; then
                return 0
              fi
              sleep 10
            done

            echo "$vm did not reach PowerState/running in time"
            timeout 30s az vm get-instance-view -g "$SQL_RG" -n "$vm" -o jsonc 2>/dev/null || true
            return 1
          }

          wait_running_strict "$SQL_VM_PRIMARY"
          wait_running_strict "$SQL_VM_SECONDARY"

      - name: Ensure clean workspace
        run: |
          git reset --hard
          git clean -xfd

      - name: Clean Terraform cache
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl

      - name: Terraform Init (SQL Server)
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
          TFSTATE_SA: ${{ secrets.TFSTATE_SA }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
          TFSTATE_KEY: "sqlpoc.sqlserver.tfstate"
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "terraform init attempt ${attempt}/3"
            if terraform init -reconfigure -upgrade \
              -backend-config="resource_group_name=${TFSTATE_RG}" \
              -backend-config="storage_account_name=${TFSTATE_SA}" \
              -backend-config="container_name=${TFSTATE_CONTAINER}" \
              -backend-config="key=${TFSTATE_KEY}"; then
              exit 0
            fi
            sleep 10
          done

          echo "terraform init failed after retries"
          exit 1

      - name: Terraform Validate
        run: terraform validate

      - name: Wait for RunCommand to be idle
        run: |
          set -euo pipefail

          wait_runcommand() {
            local vm="$1"
            local tries=30
            local delay=20
            for i in $(seq 1 "$tries"); do
              echo "RunCommand probe on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript --scripts "Write-Host 'runcommand-ready'" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              if echo "$out" | grep -qi "The operation was canceled"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            return 1
          }

          ready=true
          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            if ! wait_runcommand "$vm"; then
              ready=false
            fi
          done

          if [ "$ready" = "true" ]; then
            echo "RUNCOMMAND_READY=true" >> "$GITHUB_ENV"
            echo "RunCommand is idle on all VMs."
          else
            echo "RUNCOMMAND_READY=false" >> "$GITHUB_ENV"
            echo "RunCommand still busy; skipping WSFC/AlwaysOn steps this run."
          fi

      - name: Detect existing WSFC
        if: ${{ env.RUNCOMMAND_READY == 'true' }}
        id: wsfc_check
        run: |
          set -euo pipefail

          echo "cluster_exists=unknown" >> "$GITHUB_OUTPUT"
          echo "CLUSTER_EXISTS=unknown" >> "$GITHUB_ENV"

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=20
            local delay=20
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                echo "$out"
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              if echo "$out" | grep -qi "The operation was canceled"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            return 1
          }

          cluster_name="$(terraform output -raw failover_cluster_name)"
          echo "Checking for existing WSFC: $cluster_name"

          out="$(run_cmd_retry "$SQL_VM_PRIMARY" --scripts "try { Get-Cluster -Name '$cluster_name' -ErrorAction Stop | Out-String; Write-Host 'CLUSTER_EXISTS=1' } catch { Write-Host 'CLUSTER_EXISTS=0' }")" || out=""
          if [ -z "$out" ]; then
            echo "Primary check failed; trying secondary"
            out="$(run_cmd_retry "$SQL_VM_SECONDARY" --scripts "try { Get-Cluster -Name '$cluster_name' -ErrorAction Stop | Out-String; Write-Host 'CLUSTER_EXISTS=1' } catch { Write-Host 'CLUSTER_EXISTS=0' }")" || out=""
          fi

          if [ -z "$out" ]; then
            echo "WSFC detection returned no output; assuming cluster does not exist"
            echo "cluster_exists=false" >> "$GITHUB_OUTPUT"
            echo "CLUSTER_EXISTS=false" >> "$GITHUB_ENV"
            echo "WSFC detection result: false"
            exit 0
          fi

          if echo "$out" | grep -q "CLUSTER_EXISTS=1"; then
            echo "cluster_exists=true" >> "$GITHUB_OUTPUT"
            echo "CLUSTER_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "cluster_exists=false" >> "$GITHUB_OUTPUT"
            echo "CLUSTER_EXISTS=false" >> "$GITHUB_ENV"
          fi

          echo "WSFC detection result: ${CLUSTER_EXISTS:-unknown}"

      - name: Skip WSFC prep/create when detection is unknown
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'unknown' }}
        run: |
          echo "WSFC detection could not run due to RunCommand conflicts; skipping prep/create in this run."

      - name: Validate existing WSFC (no prep/create)
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'true' }}
        run: |
          set -euo pipefail

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=6
            local delay=15
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            return 1
          }

          cluster_name="$(terraform output -raw failover_cluster_name)"
          echo "== Validating existing WSFC for cluster: $cluster_name =="
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts @cluster_validate.ps1 \
            --parameters \
              "ClusterName=$cluster_name" \
              "PrimaryName=$SQL_VM_PRIMARY" \
              "SecondaryName=$SQL_VM_SECONDARY"

      - name: Prep WSFC nodes (local user + hosts + cluster feature)
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'false' }}
        run: |
          set -euo pipefail

          if [ "${CLUSTER_EXISTS:-unknown}" != "false" ]; then
            echo "WSFC detection not false (value: ${CLUSTER_EXISTS:-unknown}); skipping prep."
            exit 0
          fi

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=12
            local delay=30
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            echo "RunCommand on $vm failed after retries"
            return 1
          }

          kv_id="$(terraform output -raw ops_key_vault_id)"
          kv_name="$(az resource show --ids "$kv_id" --query name -o tsv)"

          sql_admin_pwd="$(az keyvault secret show --vault-name "$kv_name" --name sql-vm-admin-password --query value -o tsv)"
          echo "::add-mask::$sql_admin_pwd"
          sql_admin_pwd_b64="$(printf '%s' "$sql_admin_pwd" | base64 -w0)"
          echo "::add-mask::$sql_admin_pwd_b64"

          cluster_user="$(terraform output -raw cluster_local_admin_username)"
          echo "Using local cluster admin user: $cluster_user"

          dns_suffix="sqlpoc.local"

          ip_primary="$(az vm show -g "$SQL_RG" -n "$SQL_VM_PRIMARY" -d --query privateIps -o tsv)"
          ip_secondary="$(az vm show -g "$SQL_RG" -n "$SQL_VM_SECONDARY" -d --query privateIps -o tsv)"

          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            echo "== WSFC prep on $vm =="
            run_cmd_retry "$vm" \
              --scripts @cluster_prep.ps1 \
              --parameters \
                "PrimaryName=$SQL_VM_PRIMARY" \
                "PrimaryIp=$ip_primary" \
                "SecondaryName=$SQL_VM_SECONDARY" \
                "SecondaryIp=$ip_secondary" \
                "DnsSuffix=$dns_suffix" \
                "LocalAdminUser=$cluster_user" \
                "LocalAdminPasswordB64=$sql_admin_pwd_b64"
          done

      - name: Reboot SQL VMs after Failover Clustering feature install
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'false' }}
        run: |
          set -euo pipefail

          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            echo "Restarting VM: $vm"
            az vm restart -g "$SQL_RG" -n "$vm" -o none
          done

          wait_running_strict() {
            local vm="$1"
            echo "Waiting for VM to return to running: $vm"
            for i in $(seq 1 60); do
              state="$(timeout 30s az vm get-instance-view -g "$SQL_RG" -n "$vm" \
                --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true)"
              ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "[$ts] [$i/60] $vm powerState=${state:-<unknown>}"
              if [ "$state" = "PowerState/running" ]; then
                return 0
              fi
              sleep 10
            done
            echo "$vm did not reach PowerState/running in time after reboot"
            timeout 30s az vm get-instance-view -g "$SQL_RG" -n "$vm" -o jsonc 2>/dev/null || true
            return 1
          }

          wait_running_strict "$SQL_VM_PRIMARY"
          wait_running_strict "$SQL_VM_SECONDARY"

      - name: Wait for RunCommand after reboot
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'false' }}
        run: |
          set -euo pipefail

          wait_runcommand() {
            local vm="$1"
            local tries=30
            local delay=20
            for i in $(seq 1 "$tries"); do
              echo "RunCommand probe on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript --scripts "Write-Host 'runcommand-ready'" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              if echo "$out" | grep -qi "The operation was canceled"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            return 1
          }

          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            wait_runcommand "$vm"
          done

      - name: Create WSFC + configure Cloud Witness
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'false' }}
        run: |
          set -euo pipefail

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=12
            local delay=30
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            echo "RunCommand on $vm failed after retries"
            return 1
          }

          witness_sa="$(terraform output -raw witness_storage_account_name)"
          echo "Witness storage account: $witness_sa"

          witness_key="$(az storage account keys list -g "$SQL_RG" -n "$witness_sa" --query "[0].value" -o tsv)"
          echo "::add-mask::$witness_key"
          witness_key_b64="$(printf '%s' "$witness_key" | base64 -w0)"
          echo "::add-mask::$witness_key_b64"

          cluster_name="$(terraform output -raw failover_cluster_name)"

          echo "== Creating/validating WSFC on $SQL_VM_PRIMARY =="
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts @cluster_create.ps1 \
            --parameters \
              "ClusterName=$cluster_name" \
              "PrimaryName=$SQL_VM_PRIMARY" \
              "SecondaryName=$SQL_VM_SECONDARY" \
              "WitnessStorageAccountName=$witness_sa" \
              "WitnessStorageAccountKeyB64=$witness_key_b64"

          cluster_name="$(terraform output -raw failover_cluster_name)"

          echo "Re-checking cluster existence after create..."
          out="$(az vm run-command invoke -g "$SQL_RG" -n "$SQL_VM_PRIMARY" \
            --command-id RunPowerShellScript \
            --scripts "try { Get-Cluster -Name '$cluster_name' -ErrorAction Stop | Out-String; Write-Host 'CLUSTER_EXISTS=1' } catch { Write-Host 'CLUSTER_EXISTS=0'; exit 1 }" \
            --query "value[0].message" -o tsv)"
          echo "$out"
          echo "CLUSTER_EXISTS=true" >> "$GITHUB_ENV"

      - name: Validate WSFC (cluster + quorum)
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'true' }}
        run: |
          set -euo pipefail

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=12
            local delay=30
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            echo "RunCommand on $vm failed after retries"
            return 1
          }

          cluster_name="$(terraform output -raw failover_cluster_name)"
          echo "== Validating WSFC for cluster: $cluster_name =="

          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts @cluster_validate.ps1 \
            --parameters \
              "ClusterName=$cluster_name" \
              "PrimaryName=$SQL_VM_PRIMARY" \
              "SecondaryName=$SQL_VM_SECONDARY"

      - name: WSFC status (PowerShell output)
        if: ${{ env.RUNCOMMAND_READY == 'true' }}
        run: |
          set -euo pipefail

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=6
            local delay=15
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            return 1
          }

          cluster_name="$(terraform output -raw failover_cluster_name)"
          echo "== WSFC status on $SQL_VM_PRIMARY for $cluster_name =="
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts "Get-Cluster -Name '$cluster_name' -ErrorAction Stop | Format-List * | Out-String" || true
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts "Get-ClusterNode -Cluster '$cluster_name' | Format-Table -AutoSize | Out-String" || true
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts "Get-ClusterGroup -Cluster '$cluster_name' | Format-Table -AutoSize | Out-String" || true
          run_cmd_retry "$SQL_VM_PRIMARY" \
            --scripts "Get-ClusterResource -Cluster '$cluster_name' | Format-Table -AutoSize | Out-String" || true

      - name: Enable SQL Always On AG (both nodes)
        if: ${{ env.RUNCOMMAND_READY == 'true' && env.CLUSTER_EXISTS == 'true' }}
        run: |
          set -euo pipefail

          run_cmd_retry() {
            local vm="$1"; shift
            local tries=12
            local delay=30
            for i in $(seq 1 "$tries"); do
              echo "RunCommand on $vm (attempt $i/$tries)"
              out="$(timeout 40m az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript "$@" --query "value[0].message" -o tsv 2>&1)"
              code=$?
              echo "$out"
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -qi "Run command extension execution is in progress"; then
                sleep "$delay"
                continue
              fi
              return $code
            done
            echo "RunCommand on $vm failed after retries"
            return 1
          }

          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            echo "== Enabling Always On on $vm =="
            run_cmd_retry "$vm" \
              --scripts @enable_alwayson.ps1 \
              --parameters "SqlInstance=localhost" || {
                echo "Always On enablement timed out or failed on $vm"
                echo "== $vm enable-alwayson.log (tail) =="
                az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript \
                  --scripts "Get-Content 'C:\\Windows\\Temp\\enable-alwayson.log' -ErrorAction SilentlyContinue | Select-Object -Last 200 | Out-String" \
                  --query "value[0].message" -o tsv || true
                exit 1
              }

            echo "== $vm enable-alwayson.log (tail) =="
            az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Content 'C:\\Windows\\Temp\\enable-alwayson.log' -ErrorAction SilentlyContinue | Select-Object -Last 200 | Out-String" \
              --query "value[0].message" -o tsv || true
          done

      - name: Install SSMS (best-effort)
        if: env.RUNCOMMAND_READY == 'true'
        run: |
          set -euo pipefail

          for vm in "$SQL_VM_PRIMARY" "$SQL_VM_SECONDARY"; do
            echo "== Installing SSMS on $vm =="
            az vm run-command invoke -g "$SQL_RG" -n "$vm" --command-id RunPowerShellScript \
              --scripts @install_ssms.ps1 \
              --query "value[0].message" -o tsv || true
          done
