name: terraform-sql-iaas

on:
  workflow_dispatch:
    inputs:
      deployment_preset:
        description: 'Deployment Configuration Preset'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'dev-ha'
          - 'dev-ha-dr'

# Prevent two runs from fighting over the same ARM resources (SQL IaaS create/update is not concurrency-safe).
concurrency:
  group: terraform-sqlserver-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-sqlserver:
    # SQL IaaS registration/unregistration can legitimately take a long time.
    timeout-minutes: 600
    runs-on:
      - self-hosted
      - linux
      - x64

    defaults:
      run:
        shell: bash
        working-directory: sqlserver

    env:
      ARM_USE_MSI: true
      ARM_CLIENT_ID: ${{ secrets['TERRAFORM_UAMI_CLIENT_ID'] }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_SKIP_AZURECLI_AUTH: "true"
      SQL_RG: rg-fnz-poc-sql-se
      SQL_DR_RG: rg-fnz-poc-sql-dr-nwe

      # Defaults (overridden in "Set Deployment Context" step)
      TF_VAR_FILE: "env/dev.tfvars"
      IS_HA: "false"
      IS_DR: "false"
      SQL_VM_PRIMARY: sqlpoc-sql-01
      SQL_VM_SECONDARY: sqlpoc-sql-02
      # DR Defaults (will be set if IS_DR=true)
      SQL_VM_DR_PRIMARY: ""
      SQL_VM_DR_SECONDARY: ""

      # Provider downloads (esp. azapi) sometimes hit slow GitHub release endpoints.
      TF_REGISTRY_CLIENT_TIMEOUT: "300"
      TF_PLUGIN_CACHE_DIR: /tmp/terraform-plugin-cache


      # If shared-key/SAS auth is disabled, use managed identity for disk_setup.ps1.
      DISK_SETUP_USE_SAS: "true"

      # GitHub Actions artifact storage is frequently quota-limited in this org.
      # Default to no uploads; logs are already tailed to the console.
      UPLOAD_ARTIFACTS: "false"

      # Changing managed disk SKUs via the AVM VM module often forces VM replacement.
      # That in turn triggers long SQL IaaS deletes. Fail fast unless explicitly allowed.
      ALLOW_DISK_SKU_DRIFT: "true"

    steps:
      # 1️⃣ Checkout FIRST
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Deployment Context
        id: context
        run: |
          echo "Selected deployment preset: ${{ github.event.inputs.deployment_preset }}"

          if [ "${{ github.event.inputs.deployment_preset }}" == "dev-ha" ]; then
            echo "Configuring for HA (Dual VM)"
            echo "TF_VAR_FILE=env/dev-ha.tfvars" >> $GITHUB_ENV
            echo "IS_HA=true" >> $GITHUB_ENV
            echo "SQL_VM_PRIMARY=poc-ha-sql-01" >> $GITHUB_ENV
            echo "SQL_VM_SECONDARY=poc-ha-sql-02" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.deployment_preset }}" == "dev-ha-dr" ]; then
            echo "Configuring for HA + DR (Quad VM)"
            echo "TF_VAR_FILE=env/dev-ha-dr.tfvars" >> $GITHUB_ENV
            echo "IS_HA=true" >> $GITHUB_ENV
            echo "IS_DR=true" >> $GITHUB_ENV
            echo "SQL_VM_PRIMARY=poc-ha-sql-01" >> $GITHUB_ENV
            echo "SQL_VM_SECONDARY=poc-ha-sql-02" >> $GITHUB_ENV
            echo "SQL_VM_DR_PRIMARY=poc-ha-dr-sql01" >> $GITHUB_ENV
            echo "SQL_VM_DR_SECONDARY=poc-ha-dr-sql02" >> $GITHUB_ENV
          else
            echo "Configuring for Mono (Single VM)"
            echo "TF_VAR_FILE=env/dev.tfvars" >> $GITHUB_ENV
            echo "IS_HA=false" >> $GITHUB_ENV
            echo "SQL_VM_PRIMARY=sqlpoc-sql-01" >> $GITHUB_ENV
            echo "SQL_VM_SECONDARY=sqlpoc-sql-02" >> $GITHUB_ENV
          fi

      - name: Show checked-out commit + SQL IaaS timeout
        run: |
          set -euo pipefail
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME:-<unset>}"
          echo "GIT_SHA=$(git rev-parse HEAD)"
          git log -1 --oneline
          echo "== azurerm_mssql_virtual_machine timeouts in main.tf =="
          awk 'NR>=160 && NR<=230 {print NR ":" $0}' main.tf | sed -n '/resource "azurerm_mssql_virtual_machine"/,/depends_on/p' || true

      - name: Set Az Login with UAMI
        run: |
          az login --identity --username "$ARM_CLIENT_ID"

      - name: Prepare Terraform plugin cache
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          echo "TF_PLUGIN_CACHE_DIR=${TF_PLUGIN_CACHE_DIR}"

      # 2️⃣ Force clean workspace
      - name: Ensure clean workspace
        run: |
          git reset --hard
          git clean -xfd

      # 3️⃣ Remove Terraform cache AFTER checkout
      - name: Clean Terraform cache
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl

      # 4️⃣ Init (upgrade providers)
      - name: Terraform Init (SQL Server)
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
          TFSTATE_SA: ${{ secrets.TFSTATE_SA }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
          TFSTATE_KEY: "sqlpoc.sqlserver.tfstate"
        run: |
          set -euo pipefail

          # Use dev-ha state for dev-ha-dr to preserve primary resources
          STATE_KEY="sqlserver-${{ github.event.inputs.deployment_preset }}.tfstate"
          if [ "${{ github.event.inputs.deployment_preset }}" == "dev-ha-dr" ]; then
            STATE_KEY="sqlserver-dev-ha.tfstate"
            echo "⚠️  Using dev-ha state file for dev-ha-dr preset to preserve Primary infrastructure"
          fi

          echo "State file: ${STATE_KEY}"

          for attempt in 1 2 3; do
            echo "terraform init attempt ${attempt}/3"
            if terraform init -reconfigure -upgrade \
              -backend-config="resource_group_name=${TFSTATE_RG}" \
              -backend-config="storage_account_name=${TFSTATE_SA}" \
              -backend-config="container_name=${TFSTATE_CONTAINER}" \
              -backend-config="key=${STATE_KEY}"; then
              exit 0
            fi
            sleep 10
          done

          echo "terraform init failed after retries"
          exit 1

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing SQL IaaS resources (if any)
        run: |
          set -euo pipefail

          vms=("$SQL_VM_PRIMARY")
          if [ "${IS_HA}" = "true" ]; then
            vms+=("$SQL_VM_SECONDARY")
          fi

          for vm in "${vms[@]}"; do
            addr="module.sql_cluster.azurerm_mssql_virtual_machine.sql_vm[\"${vm}\"]"
            rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"

            echo "Checking SQL IaaS resource: $rid"
            if az resource show --ids "$rid" -o none 2>/dev/null; then
              if terraform state show "$addr" >/dev/null 2>&1; then
                echo "$addr already in state"
              else
                echo "Importing $addr"
                terraform import -var-file="$TF_VAR_FILE" "$addr" "$rid"
              fi
            else
              echo "Not found in Azure, skipping import"
            fi
          done

          if [ "${IS_DR}" = "true" ]; then
             dr_vms=("$SQL_VM_DR_PRIMARY" "$SQL_VM_DR_SECONDARY")
             for vm in "${dr_vms[@]}"; do
                addr="module.sql_cluster_dr[0].azurerm_mssql_virtual_machine.sql_vm[\"${vm}\"]"
                rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_DR_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"

                echo "Checking DR SQL IaaS resource: $rid"
                if az resource show --ids "$rid" -o none 2>/dev/null; then
                  if terraform state show "$addr" >/dev/null 2>&1; then
                    echo "$addr already in state"
                  else
                    echo "Importing $addr"
                    terraform import -var-file="$TF_VAR_FILE" "$addr" "$rid"
                  fi
                else
                  echo "DR Resource Not found in Azure, skipping import"
                fi
             done
          fi

      - name: Prune missing SQL IaaS resources from state (best-effort)
        run: |
          set -euo pipefail

          vms=("$SQL_VM_PRIMARY")
          if [ "${IS_HA}" = "true" ]; then
            vms+=("$SQL_VM_SECONDARY")
          fi

          for vm in "${vms[@]}"; do
            addr="module.sql_cluster.azurerm_mssql_virtual_machine.sql_vm[\"${vm}\"]"
            rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"

            if terraform state show "$addr" >/dev/null 2>&1; then
              if az resource show --ids "$rid" -o none 2>/dev/null; then
                echo "$addr exists in Azure; keeping in state"
              else
                echo "Azure resource missing; removing from state: $addr"
                terraform state rm "$addr"
              fi
            else
              echo "$addr not in state; nothing to prune"
            fi
          done

          if [ "${IS_DR}" = "true" ]; then
             dr_vms=("$SQL_VM_DR_PRIMARY" "$SQL_VM_DR_SECONDARY")
             for vm in "${dr_vms[@]}"; do
                addr="module.sql_cluster_dr[0].azurerm_mssql_virtual_machine.sql_vm[\"${vm}\"]"
                rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_DR_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"

                if terraform state show "$addr" >/dev/null 2>&1; then
                  if az resource show --ids "$rid" -o none 2>/dev/null; then
                    echo "$addr exists in Azure; keeping in state"
                  else
                    echo "Azure DR resource missing; removing from state: $addr"
                    terraform state rm "$addr"
                  fi
                else
                  echo "$addr not in state; nothing to prune"
                fi
             done
          fi

      - name: "Preflight: fail fast on disk SKU drift (prevents VM replacement)"
        run: |
          set -euo pipefail

          if [ "${ALLOW_DISK_SKU_DRIFT}" = "true" ]; then
            echo "ALLOW_DISK_SKU_DRIFT=true; skipping disk SKU drift preflight"
            exit 0
          fi

          desired_os="$(terraform console -var-file="$TF_VAR_FILE" <<< 'var.os_disk_type' | tr -d '\r' | tr -d '"')"
          desired_data="$(terraform console -var-file="$TF_VAR_FILE" <<< 'var.data_disk_type' | tr -d '\r' | tr -d '"')"
          desired_log="$(terraform console -var-file="$TF_VAR_FILE" <<< 'var.log_disk_type' | tr -d '\r' | tr -d '"')"
          desired_tempdb="$(terraform console -var-file="$TF_VAR_FILE" <<< 'var.tempdb_disk_type' | tr -d '\r' | tr -d '"')"

          echo "Desired disk SKUs: os=${desired_os}, data=${desired_data}, log=${desired_log}, tempdb=${desired_tempdb}"

          check_vm() {
            local vm="$1"
            local rg="${2:-$SQL_RG}"
            echo "== Disk SKU preflight for ${vm} in ${rg} =="

            if ! az vm show -g "$rg" -n "$vm" -o none 2>/dev/null; then
              echo "VM ${vm} not found (ok on first deploy)"
              return 0
            fi

            os_sku="$(az vm show -g "$rg" -n "$vm" --query "storageProfile.osDisk.managedDisk.storageAccountType" -o tsv)"
            data_skus="$(az vm show -g "$rg" -n "$vm" --query "storageProfile.dataDisks[].managedDisk.storageAccountType" -o tsv | tr '\n' ' ' | sed 's/[[:space:]]\+$//')"

            echo "Azure osDisk SKU: ${os_sku}"
            echo "Azure dataDisks SKUs: ${data_skus:-<none>}"
            
            # ... checks ...
            mismatched="false"
            if [ -n "${desired_os}" ] && [ "${os_sku}" != "${desired_os}" ]; then
               echo "Mismatch: osDisk is ${os_sku} but desired is ${desired_os}"
               mismatched="true"
            fi
             # If any data disk SKU differs from the desired SKU, treat as drift.
            if [ -n "${data_skus}" ] && [ -n "${desired_data}" ]; then
              for s in ${data_skus}; do
                if [ "${s}" != "${desired_data}" ]; then
                  echo "Mismatch: dataDisk is ${s} but desired is ${desired_data}"
                  mismatched="true"
                fi
              done
            fi

            if [ "${mismatched}" = "true" ]; then
                echo "Disk SKU drift detected on ${vm}."
                return 1
            fi
            return 0
          }

          check_vm "$SQL_VM_PRIMARY"
          if [ "${IS_HA}" = "true" ]; then
            check_vm "$SQL_VM_SECONDARY"
          fi
          if [ "${IS_DR}" = "true" ]; then
             check_vm "$SQL_VM_DR_PRIMARY" "$SQL_DR_RG"
             check_vm "$SQL_VM_DR_SECONDARY" "$SQL_DR_RG"
          fi

      - name: Terraform Plan
        id: tf_plan
        run: |
          set +e

          log_file="terraform-plan.log"
          rm -f "$log_file"

          on_term() {
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform plan received termination signal"
            echo "Last 50 lines of $log_file:"
            tail -n 50 "$log_file" 2>/dev/null || true
          }
          trap on_term SIGINT SIGTERM

          # Plan is informational; apply runs in two phases for stability.
          ( terraform plan -input=false -var-file="$TF_VAR_FILE" 2>&1 | tee "$log_file" ) &
          pid=$!

          # Heartbeat every 60s so slow AzureRM refresh doesn't look hung.
          while kill -0 "$pid" 2>/dev/null; do
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform plan still running..."
            tail -n 5 "$log_file" 2>/dev/null || true
            sleep 60
          done

          wait "$pid"
          code=$?
          echo "Last 30 lines of $log_file:"
          tail -n 30 "$log_file" 2>/dev/null || true
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: "Terraform Apply (Phase 1: VMs + extensions)"
        id: tf_apply_vms
        continue-on-error: true
        run: |
          set +e

          log_file="terraform-apply.log"
          rm -f "$log_file"

          on_term() {
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform apply received termination signal"
            echo "Last 50 lines of $log_file:"
            tail -n 50 "$log_file" 2>/dev/null || true
          }
          trap on_term SIGINT SIGTERM

          # Phase 1 applies only the VM module. This avoids racing SQL IaaS registration
          # against transient VM restarts/deallocations.
          TARGETS="-target=module.sql_cluster.module.sql_vm"
          if [ "${IS_DR}" = "true" ]; then
            TARGETS="$TARGETS -target=module.sql_cluster_dr[0].module.sql_vm"
          fi
          
          echo "Applying targets: $TARGETS"
          ( terraform apply -auto-approve -var-file="$TF_VAR_FILE" $TARGETS 2>&1 | tee "$log_file" ) &
          pid=$!

          azure_watch_counter=0

          # Heartbeat every 2 minutes so long-running resources don't look hung.
          while kill -0 "$pid" 2>/dev/null; do
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform apply still running..."
            tail -n 5 "$log_file" 2>/dev/null || true

            # Every 10 minutes, also print Azure-side provisioning + power state.
            azure_watch_counter=$((azure_watch_counter + 1))
            if [ $((azure_watch_counter % 5)) -eq 0 ]; then
              echo "[$ts] Azure status snapshot (every ~10 minutes)"

              vms=("$SQL_VM_PRIMARY")
              if [ "${IS_HA}" = "true" ]; then
                vms+=("$SQL_VM_SECONDARY")
              fi

              for vm in "${vms[@]}"; do
                echo "-- $vm power state --"
                az vm get-instance-view -g "$SQL_RG" -n "$vm" \
                  --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true

                echo "-- $vm imageReference / plan --"
                az vm show -g "$SQL_RG" -n "$vm" \
                  --query 'storageProfile.imageReference, plan' \
                  -o jsonc 2>/dev/null || true

                echo "-- $vm SQL IaaS provisioningState --"
                rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
                az resource show --ids "$rid" --query "properties.provisioningState" -o tsv 2>/dev/null || true

                echo "-- $vm SQL IaaS key properties --"
                az resource show --ids "$rid" \
                  --query "{provisioningState:properties.provisioningState, sqlImageSku:properties.sqlImageSku, sqlManagement:properties.sqlManagement, license:properties.sqlServerLicenseType, leastPrivilegeMode:properties.leastPrivilegeMode, provisioningFailureDetails:properties.provisioningFailureDetails, errors:properties.errors}" \
                  -o jsonc 2>/dev/null || true

                echo "-- $vm VM extensions (name: provisioningState / status) --"
                az vm extension list -g "$SQL_RG" --vm-name "$vm" \
                  --query "[].{name:name, publisher:publisher, type:typePropertiesType, provisioningState:provisioningState, status:instanceView.statuses[0].displayStatus}" \
                  -o table 2>/dev/null || true
              done
              
              if [ "${IS_DR}" = "true" ]; then
                dr_vms=("$SQL_VM_DR_PRIMARY" "$SQL_VM_DR_SECONDARY")
                for vm in "${dr_vms[@]}"; do
                  echo "-- $vm (DR) power state --"
                  az vm get-instance-view -g "$SQL_DR_RG" -n "$vm" \
                    --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true

                  echo "-- $vm (DR) SQL IaaS provisioningState --"
                  rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_DR_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
                  az resource show --ids "$rid" --query "properties.provisioningState" -o tsv 2>/dev/null || true
                done
              fi
            fi
            sleep 120
          done

          wait "$pid"
          code=$?
          # Always print a small tail for context
          echo "Last 30 lines of $log_file:"
          tail -n 30 "$log_file" 2>/dev/null || true
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail fast if VM phase failed
        if: ${{ steps.tf_apply_vms.outputs.exitcode != '0' }}
        run: |
          echo "Terraform apply phase 1 (VMs/extensions) failed (exitcode=${{ steps.tf_apply_vms.outputs.exitcode }})"
          exit 1

      - name: Ensure SQL VMs are running (required for SQL IaaS)
        if: steps.tf_apply_vms.outputs.exitcode == '0'
        run: |
          set -euo pipefail

          wait_running_strict() {
            local vm="$1"
            local rg="${2:-$SQL_RG}"
            echo "Ensuring VM is running (strict): $vm in $rg"

            # Try to start (ignore errors if currently provisioning)
            timeout 30s az vm start -g "$rg" -n "$vm" -o none 2>/dev/null || true

            for i in $(seq 1 60); do
              state="$(timeout 30s az vm get-instance-view -g "$rg" -n "$vm" \
                --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true)"
              ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "[$ts] [$i/60] $vm powerState=${state:-<unknown>}"
              if [ "$state" = "PowerState/running" ]; then
                return 0
              fi
              sleep 10
            done

            echo "$vm did not reach PowerState/running in time"
            timeout 30s az vm get-instance-view -g "$rg" -n "$vm" -o jsonc 2>/dev/null || true
            return 1
          }

          wait_running_strict "$SQL_VM_PRIMARY"
          if [ "${IS_HA}" = "true" ]; then
            wait_running_strict "$SQL_VM_SECONDARY"
          fi
          if [ "${IS_DR}" = "true" ]; then
            wait_running_strict "$SQL_VM_DR_PRIMARY" "$SQL_DR_RG"
            wait_running_strict "$SQL_VM_DR_SECONDARY" "$SQL_DR_RG"
          fi

      - name: "Terraform Apply (Phase 2: SQL IaaS + remaining resources)"
        id: tf_apply
        continue-on-error: true
        if: ${{ steps.tf_apply_vms.outputs.exitcode == '0' }}
        run: |
          set +e
          log_file="terraform-apply.log"
          on_term() {
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform apply (phase 2) received termination signal"
            echo "Last 50 lines of $log_file:"
            tail -n 50 "$log_file" 2>/dev/null || true
          }
          trap on_term SIGINT SIGTERM
          ( terraform apply -parallelism=1 -auto-approve -var-file="$TF_VAR_FILE" 2>&1 | tee -a "$log_file" ) &
          pid=$!
          azure_watch_counter=0
          while kill -0 "$pid" 2>/dev/null; do
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$ts] terraform apply (phase 2) still running..."
            tail -n 5 "$log_file" 2>/dev/null || true
            azure_watch_counter=$((azure_watch_counter + 1))
            if [ $((azure_watch_counter % 5)) -eq 0 ]; then
              echo "[$ts] Azure status snapshot (every ~10 minutes)"

              vms=("$SQL_VM_PRIMARY")
              if [ "${IS_HA}" = "true" ]; then
                vms+=("$SQL_VM_SECONDARY")
              fi

              for vm in "${vms[@]}"; do
                echo "-- $vm power state --"
                az vm get-instance-view -g "$SQL_RG" -n "$vm" \
                  --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true
                echo "-- $vm SQL IaaS provisioningState --"
                rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
                az resource show --ids "$rid" --query "properties.provisioningState" -o tsv 2>/dev/null || true
              done

              if [ "${IS_DR}" = "true" ]; then
                dr_vms=("$SQL_VM_DR_PRIMARY" "$SQL_VM_DR_SECONDARY")
                for vm in "${dr_vms[@]}"; do
                  echo "-- $vm (DR) power state --"
                  az vm get-instance-view -g "$SQL_DR_RG" -n "$vm" \
                    --query "instanceView.statuses[?starts_with(code,'PowerState/')].code | [0]" -o tsv 2>/dev/null || true
                  
                  echo "-- $vm (DR) SQL IaaS provisioningState --"
                  rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_DR_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
                  az resource show --ids "$rid" --query "properties.provisioningState" -o tsv 2>/dev/null || true
                done
              fi
            fi
            sleep 120
          done
          wait "$pid"
          code=$?
          echo "Last 30 lines of $log_file:"
          tail -n 30 "$log_file" 2>/dev/null || true
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Terraform logs
        if: ${{ env.UPLOAD_ARTIFACTS == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: terraform-sqlserver-logs
          if-no-files-found: warn
          retention-days: 3
          path: |
            sqlserver/terraform-plan.log
            sqlserver/terraform-apply.log


      - name: Diagnostics (extension instance-view)
        if: steps.tf_apply.outputs.exitcode != '0'
        run: |
          set -e
          echo "== sql-primary extension instance-view =="
          az vm extension show -g "$SQL_RG" --vm-name "$SQL_VM_PRIMARY" -n configure-sql-disks --instance-view -o jsonc || true

          if [ "${IS_HA}" = "true" ]; then
            echo "== sql-secondary extension instance-view =="
            az vm extension show -g "$SQL_RG" --vm-name "$SQL_VM_SECONDARY" -n configure-sql-disks --instance-view -o jsonc || true
          fi
          
          if [ "${IS_DR}" = "true" ]; then
             echo "== sql-dr-primary extension instance-view =="
             az vm extension show -g "$SQL_DR_RG" --vm-name "$SQL_VM_DR_PRIMARY" -n configure-sql-disks --instance-view -o jsonc || true
             echo "== sql-dr-secondary extension instance-view =="
             az vm extension show -g "$SQL_DR_RG" --vm-name "$SQL_VM_DR_SECONDARY" -n configure-sql-disks --instance-view -o jsonc || true
          fi

      - name: Diagnostics (SQL IaaS provisioning state)
        if: steps.tf_apply.outputs.exitcode != '0'
        run: |
          set -e

          vms=("$SQL_VM_PRIMARY")
          if [ "${IS_HA}" = "true" ]; then
            vms+=("$SQL_VM_SECONDARY")
          fi

          for vm in "${vms[@]}"; do
            rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
            echo "== $vm SQL IaaS resource =="
            az resource show --ids "$rid" -o jsonc || true
          done

          if [ "${IS_DR}" = "true" ]; then
             dr_vms=("$SQL_VM_DR_PRIMARY" "$SQL_VM_DR_SECONDARY")
             for vm in "${dr_vms[@]}"; do
                rid="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${SQL_DR_RG}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/${vm}"
                echo "== $vm (DR) SQL IaaS resource =="
                az resource show --ids "$rid" -o jsonc || true
             done
          fi

      - name: Diagnostics (pull on-VM logs)
        if: steps.tf_apply.outputs.exitcode != '0'
        run: |
          set -e
          
          # Helper for dumping logs
          dump_logs() {
             local vm="$1"
             local rg="$2"
             
            echo "== $vm disk inventory =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Disk | Select Number,PartitionStyle,IsOffline,IsReadOnly,OperationalStatus,Size,Location | Format-Table -AutoSize | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm temp log file list =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-ChildItem 'C:\\Windows\\Temp\\configure-sql-disks*' -ErrorAction SilentlyContinue | Select Name,Length,LastWriteTime | Format-Table -AutoSize | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm configure-sql-disks.err.txt =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Content 'C:\\Windows\\Temp\\configure-sql-disks.err.txt' -ErrorAction SilentlyContinue | Select-Object -Last 400 | Out-String" \
              --query "value[0].message" -o tsv || true
            echo "== $vm configure-sql-disks.log (tail) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Content 'C:\\Windows\\Temp\\configure-sql-disks.log' -ErrorAction SilentlyContinue | Select-Object -Last 400 | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm enable-alwayson.log (tail) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Content 'C:\\Windows\\Temp\\enable-alwayson.log' -ErrorAction SilentlyContinue | Select-Object -Last 400 | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm CustomScriptExtension status files (tail) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "(Get-ChildItem 'C:\\WindowsAzure\\Logs\\Plugins\\Microsoft.Compute.CustomScriptExtension\\*\\Status\\*.status' -ErrorAction SilentlyContinue; Get-ChildItem 'C:\\Packages\\Plugins\\Microsoft.Compute.CustomScriptExtension\\*\\Status\\*.status' -ErrorAction SilentlyContinue) | Sort-Object LastWriteTime | Select-Object -Last 3 | ForEach-Object { '--- ' + $_.FullName; Get-Content $_.FullName -Tail 200 } | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm CustomScriptHandler.log (tail) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "(Get-ChildItem 'C:\\WindowsAzure\\Logs\\Plugins\\Microsoft.Compute.CustomScriptExtension\\*\\CustomScriptHandler.log' -ErrorAction SilentlyContinue; Get-ChildItem 'C:\\Packages\\Plugins\\Microsoft.Compute.CustomScriptExtension\\*\\CustomScriptHandler.log' -ErrorAction SilentlyContinue) | Sort-Object LastWriteTime | Select-Object -Last 1 | ForEach-Object { '--- ' + $_.FullName; Get-Content $_.FullName -Tail 400 } | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm SqlIaasExtension instance-view =="
            az vm extension show -g "$rg" --vm-name "$vm" -n SqlIaasExtension --instance-view -o jsonc || true
             
            echo "== $vm run-command disk-setup =="
            az vm run-command show -g "$rg" --vm-name "$vm" --run-command-name disk-setup --instance-view -o jsonc || true
            
            echo "== $vm SQL IaaS extension logs (tail) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "$paths=@('C:\\WindowsAzure\\Logs\\Plugins\\Microsoft.SqlServer.Management.SqlIaasExtension','C:\\Packages\\Plugins\\Microsoft.SqlServer.Management.SqlIaasExtension','C:\\WindowsAzure\\Logs\\Plugins\\Microsoft.SqlServer.Management.SqlIaaSAgent','C:\\Packages\\Plugins\\Microsoft.SqlServer.Management.SqlIaaSAgent'); foreach($p in $paths){ if(Test-Path $p){ Write-Host ('--- ' + $p); Get-ChildItem $p -Recurse -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime | Select-Object -Last 6 | ForEach-Object { '### ' + $_.FullName; Get-Content $_.FullName -Tail 200 -ErrorAction SilentlyContinue } } } | Out-String" \
              --query "value[0].message" -o tsv || true
          }

          dump_logs "$SQL_VM_PRIMARY" "$SQL_RG"
          if [ "${IS_HA}" = "true" ]; then
            dump_logs "$SQL_VM_SECONDARY" "$SQL_RG"
          fi
          if [ "${IS_DR}" = "true" ]; then
             dump_logs "$SQL_VM_DR_PRIMARY" "$SQL_DR_RG"
             dump_logs "$SQL_VM_DR_SECONDARY" "$SQL_DR_RG"
          fi

      - name: Diagnostics (disk + drive-letter mapping)
        if: steps.tf_apply.outputs.exitcode != '0'
        run: |
          set -e
          
          check_drives() {
             local vm="$1"
             local rg="$2"

            echo "== $vm drive letters / volumes =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-PSDrive -PSProvider FileSystem | Sort-Object Name | Format-Table -AutoSize | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm Get-Volume =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Volume | Sort-Object DriveLetter | Select DriveLetter,FileSystemLabel,FileSystem,HealthStatus,Size,SizeRemaining,Path | Format-Table -AutoSize | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm Get-Partition (data disks only) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "Get-Disk | Where-Object { -not $_.IsBoot -and -not $_.IsSystem } | ForEach-Object { $dn=$_.Number; Get-Partition -DiskNumber $dn -ErrorAction SilentlyContinue | Select DiskNumber,PartitionNumber,DriveLetter,Type,Size,AccessPaths } | Format-Table -Wrap -AutoSize | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm mountvol output =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "cmd /c 'mountvol' | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm diskpart list volume =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "$t=Join-Path $env:TEMP 'diskpart-listvol.txt'; Set-Content -Path $t -Value 'list volume' -Encoding ASCII; cmd /c \"diskpart /s $t\" 2^>^&1 | Out-String" \
              --query "value[0].message" -o tsv || true

            echo "== $vm MountedDevices (F/G/T) =="
            az vm run-command invoke -g "$rg" -n "$vm" --command-id RunPowerShellScript \
              --scripts "$p='HKLM:\\SYSTEM\\MountedDevices'; $names='\\DosDevices\\F:','\\DosDevices\\G:','\\DosDevices\\T:'; foreach($n in $names){ try{ $v=(Get-ItemProperty -Path $p -Name $n -ErrorAction Stop).$n; Write-Host ($n+' = '+([BitConverter]::ToString($v))) } catch { Write-Host ($n+' = <none>') } }" \
              --query "value[0].message" -o tsv || true
          }
          
          check_drives "$SQL_VM_PRIMARY" "$SQL_RG"
          if [ "${IS_HA}" = "true" ]; then
             check_drives "$SQL_VM_SECONDARY" "$SQL_RG"
          fi
          if [ "${IS_DR}" = "true" ]; then
             check_drives "$SQL_VM_DR_PRIMARY" "$SQL_DR_RG"
             check_drives "$SQL_VM_DR_SECONDARY" "$SQL_DR_RG"
          fi


      - name: Fail job if apply failed
        if: steps.tf_apply.outputs.exitcode != '0'
        run: |
          echo "Terraform apply failed (exitcode=${{ steps.tf_apply.outputs.exitcode }})"
          exit 1
