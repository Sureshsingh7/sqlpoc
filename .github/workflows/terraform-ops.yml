name: terraform-ops

on:
  workflow_dispatch:
    inputs:
      deployment_preset:
        description: 'Deployment Configuration Preset'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'dev-ha-dr'

jobs:
  terraform-ops:
    runs-on:
      - self-hosted
      - linux
      - x64

    defaults:
      run:
        shell: bash
        working-directory: ops

    env:
      ARM_USE_MSI: true
      ARM_CLIENT_ID: ${{ secrets.TERRAFORM_UAMI_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_SKIP_AZURECLI_AUTH: "true"

    steps:
      # 1️⃣ Checkout FIRST
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Deployment Context
        run: |
          echo "Selected deployment preset: ${{ github.event.inputs.deployment_preset }}"

          if [ "${{ github.event.inputs.deployment_preset }}" == "dev-ha-dr" ]; then
            echo "Configuring for PRIMARY + DR Key Vaults"
            echo "TF_VAR_enable_dr=true" >> $GITHUB_ENV
          else
            echo "Configuring for PRIMARY only (dev)"
            echo "TF_VAR_enable_dr=false" >> $GITHUB_ENV
          fi

      - name: Set Az Login with UAMI
        run: |
          az login --identity --username "$ARM_CLIENT_ID"

      # 2️⃣ Force clean workspace
      - name: Ensure clean workspace
        run: |
          git reset --hard
          git clean -xfd

      # 3️⃣ Remove Terraform cache AFTER checkout
      - name: Clean Terraform cache
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl

      # 4️⃣ Init (upgrade providers)
      - name: Terraform Init (Ops)
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
          TFSTATE_SA: ${{ secrets.TFSTATE_SA }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
          TFSTATE_KEY: "sqlpoc.ops.tfstate"
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="resource_group_name=${TFSTATE_RG}" \
            -backend-config="storage_account_name=${TFSTATE_SA}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="use_msi=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Publish install_ssms.ps1 to TFSTATE + generate SAS
        env:
          TFSTATE_SA: ${{ secrets.TFSTATE_SA }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
        run: |
          set -euo pipefail

          echo "Uploading install_ssms.ps1 to: ${TFSTATE_SA}/${TFSTATE_CONTAINER}/scripts/install_ssms.ps1"
          az storage blob upload \
            --auth-mode login \
            --account-name "${TFSTATE_SA}" \
            --container-name "${TFSTATE_CONTAINER}" \
            --name "scripts/install_ssms.ps1" \
            --file "install_ssms.ps1" \
            --overwrite true \
            --only-show-errors

          # User delegation SAS (valid for 6 hours)
          expiry="$(date -u -d '+6 hours' +%Y-%m-%dT%H:%MZ)"
          sas="$(az storage blob generate-sas \
            --auth-mode login \
            --as-user \
            --account-name "${TFSTATE_SA}" \
            --container-name "${TFSTATE_CONTAINER}" \
            --name "scripts/install_ssms.ps1" \
            --permissions r \
            --expiry "${expiry}" \
            --https-only \
            -o tsv)"

          echo "::add-mask::${sas}"

          if [ -z "${sas}" ]; then
            echo "Failed to generate user-delegation SAS."
            exit 1
          fi

          echo "TF_VAR_install_ssms_sas=${sas}" >> "$GITHUB_ENV"

      - name: State cleanup (skip RBAC destroys when disabled)
        run: |
          set -euo pipefail

          if grep -Eq '^\s*manage_role_assignments\s*=\s*false\b' terraform.tfvars; then
            echo "manage_role_assignments=false; removing role assignments from Terraform state (if present)"
            for addr in \
              'azurerm_role_assignment.jumpbox_vm_admin_login[0]' \
              'azurerm_role_assignment.kv_tf_secrets_officer[0]' \
              'azurerm_role_assignment.kv_suresh_reader[0]'; do
              if terraform state list | grep -Fxq "$addr"; then
                echo "terraform state rm $addr"
                terraform state rm "$addr" || true
              else
                echo "not in state: $addr"
              fi
            done
          else
            echo "manage_role_assignments not set to false; leaving state as-is"
          fi

      - name: Terraform Plan
        run: |
          set -euo pipefail

          # When deploying DR, show full plan but we'll only apply DR resources
          if [ "$TF_VAR_enable_dr" == "true" ]; then
            echo "Planning PRIMARY + DR deployment (will only apply DR resources to avoid touching PRIMARY)"
            terraform plan -input=false -var="enable_dr=true" -out=tfplan
          else
            echo "Planning PRIMARY-only deployment"
            terraform plan -input=false -var="enable_dr=false" -out=tfplan
          fi

      - name: Terraform Apply
        run: |
          set -euo pipefail

          if [ "$TF_VAR_enable_dr" == "true" ]; then
            echo "DR deployment: Only applying DR Key Vault resources (PRIMARY already exists)"
            TARGETS="-target=module.ops_kv_dr[0] -target=module.kv_private_dns_dr[0] -target=random_password.dr_sql_vm_admin[0] -target=data.azurerm_resource_group.dr[0]"
            echo "Applying targets: $TARGETS"
            terraform apply -auto-approve $TARGETS tfplan
          else
            echo "PRIMARY deployment: Applying all resources"
            terraform apply -auto-approve tfplan
          fi
