name: terraform-dc

on:
  workflow_dispatch:         # manual trigger (recommended for DCs)
  pull_request:
    paths:
      - "dc/**"

jobs:
  terraform-dc:
    runs-on:
      - self-hosted
      - linux
      - x64

    defaults:
      run:
        shell: bash

    steps:
      - name: Clean Terraform cache
        working-directory: dc
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl

      - name: Terraform Init with Backend Config (DC)
        working-directory: dc
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
          TFSTATE_SA: ${{ secrets.TFSTATE_SA }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
          TFSTATE_KEY: ${{ secrets.TFSTATE_KEY_DC }}
          ARM_USE_MSI: true
          ARM_CLIENT_ID: ${{ secrets.TERRAFORM_UAMI_CLIENT_ID }}
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="resource_group_name=${TFSTATE_RG}" \
            -backend-config="storage_account_name=${TFSTATE_SA}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Checkout repository (clean)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure clean workspace
        run: |
          git reset --hard
          git clean -xfd

      - name: Terraform Validate
        working-directory: dc
        run: terraform validate

      - name: Terraform Plan (DC)
        working-directory: dc
        run: terraform plan -out=tfplan

      - name: Terraform Apply (DC)
        working-directory: dc
        run: terraform apply -auto-approve tfplan
