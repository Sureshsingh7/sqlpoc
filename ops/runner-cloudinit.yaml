
#cloud-config
package_update: true
packages:
  - curl
  - unzip
  - jq
  - git

runcmd:
  # Install Azure CLI
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # Install Terraform
  - curl -fsSL https://apt.releases.hashicorp.com/gpg | apt-key add -
  - apt-add-repository "deb https://apt.releases.hashicorp.com $(lsb_release -cs) main"
  - apt-get update && apt-get install -y terraform

  # GitHub Actions runner
  - mkdir /actions-runner
  - cd /actions-runner
  - curl -L -o runner.tar.gz https://github.com/actions/runner/releases/latest/download/actions-runner-linux-x64.tar.gz
  - tar xzf runner.tar.gz
  - chown -R ${vm_admin_username}:${vm_admin_username} /actions-runner

  # Configure runner
  - sudo -u ${vm_admin_username} ./config.sh \
      --url ${github_repo_url} \
      --token ${github_runner_token} \
      --unattended \
      --labels terraform,azure \
      --name sqltfpoc-runner

  # Run as service
  - ./svc.sh install
  - ./svc.sh start
  - echo "GitHub Actions runner setup completed."